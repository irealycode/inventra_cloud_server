services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-inventra}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-inventra}
      POSTGRES_DB: ${POSTGRES_DB:-cloud}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-inventra} -d ${POSTGRES_DB:-cloud}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER:-inventra}:${POSTGRES_PASSWORD:-inventra}@db:5432/${POSTGRES_DB:-cloud}
      ADMIN_TOKEN: ${ADMIN_TOKEN}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRE_MINUTES: ${JWT_EXPIRE_MINUTES:-720}
      SETUP_TOKEN_TTL_HOURS: ${SETUP_TOKEN_TTL_HOURS:-72}
    # Bound to localhost only — public traffic comes in through Caddy (TLS).
    # Keeps host-local tools (smoke_test.py, inventra_admin.py) working.
    ports:
      - "127.0.0.1:32950:32950"

  # Reverse proxy + automatic HTTPS (Let's Encrypt). Set DOMAIN in .env.
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      - api
    environment:
      DOMAIN: ${DOMAIN}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  pgdata:
  caddy_data:
  caddy_config:
